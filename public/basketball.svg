<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="courtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c17828"/>
      <stop offset="100%" stop-color="#8b4f12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="rgba(255,210,90,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="45%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>

  <!-- Hardwood floor -->
  <rect width="400" height="140" fill="url(#courtGrad)"/>

  <!-- Wood grain lines -->
  <line x1="0" y1="18" x2="400" y2="18" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="36" x2="400" y2="36" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="54" x2="400" y2="54" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="72" x2="400" y2="72" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="108" x2="400" y2="108" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="0" y1="126" x2="400" y2="126" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

  <!-- Spotlight glow -->
  <rect width="400" height="140" fill="url(#glow)"/>

  <!-- 3-point arc (half-court, top view) -->
  <path d="M 36 0 L 36 40 Q 36 148 200 148 Q 364 148 364 40 L 364 0" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- Lane / paint box -->
  <rect x="148" y="0" width="104" height="74" fill="rgba(160,70,15,0.38)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- Restricted area semicircle (inside paint) -->
  <path d="M 176 0 A 24 24 0 0 1 224 0" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- Free-throw circle -->
  <ellipse cx="200" cy="74" rx="52" ry="22" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- Backboard -->
  <rect x="176" y="1" width="48" height="5" rx="1" fill="rgba(255,255,255,0.88)"/>

  <!-- Rim -->
  <circle cx="200" cy="13" r="11" fill="none" stroke="rgba(255,180,40,0.95)" stroke-width="3"/>

  <!-- Basketball -->
  <circle cx="200" cy="95" r="17" fill="#e87020"/>
  <!-- Seam lines -->
  <path d="M 183 95 Q 191.5 81 200 95 Q 208.5 109 217 95" fill="none" stroke="rgba(100,30,5,0.75)" stroke-width="1.5"/>
  <path d="M 200 78 Q 214 87 200 95 Q 186 103 200 112" fill="none" stroke="rgba(100,30,5,0.75)" stroke-width="1.5"/>
  <circle cx="200" cy="95" r="17" fill="none" stroke="rgba(100,30,5,0.45)" stroke-width="1.5"/>

  <!-- Shadow under ball -->
  <ellipse cx="200" cy="114" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>

  <!-- Bottom fade for text legibility -->
  <rect width="400" height="140" fill="url(#bottomFade)"/>
</svg>
